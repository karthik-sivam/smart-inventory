# Flow 64 — Create a new template from scratch via TemplatesListView
appId: com.vishuddhi.stoqly
---
- runFlow: 00_signin_helper.yaml
- tapOn: "Dashboard"
- tapOn:
    id: "gear"
- scrollUntilVisible:
    element: "Item Templates"
    direction: DOWN
    timeout: 10000
- tapOn: "Item Templates"
# Cleanup leftovers from prior runs
- swipe:
    direction: LEFT
    on: "Maestro Test Template Edited"
    optional: true
- tapOn:
    text: "Delete"
    optional: true
- tapOn:
    text: "Delete Template"
    optional: true
- swipe:
    direction: LEFT
    on: "Maestro Test Template"
    optional: true
- tapOn:
    text: "Delete"
    optional: true
- tapOn:
    text: "Delete Template"
    optional: true
- tapOn:
    id: "createTemplateButton"
- assertVisible: "New Template"
- tapOn:
    id: "templateNameField"
- inputText: "Maestro Test Template"
- scrollUntilVisible:
    element: "Category"
    direction: DOWN
    timeout: 10000
- tapOn: "Category"
- tapOn: "Food & Beverage"
- tapOn:
    text: "Back"
    optional: true
- scrollUntilVisible:
    element: "Save"
    direction: UP
    timeout: 5000
- tapOn: "Save"
- assertVisible: "Maestro Test Template"
- assertVisible:
    text: "Food & Beverage"
    optional: true
