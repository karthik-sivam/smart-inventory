# Flow 41 — Add Item Form Validation (name required for Save)
appId: com.vishuddhi.stoqly
---
- runFlow: 00_signin_helper.yaml
- tapOn: "Storages"
- tapOn: "Test Warehouse"
- tapOn:
    text: "Add Item"
- assertVisible: "Add Item"
- tapOn: "Item Name"
- inputText: "Validation Test"
- assertVisible: "Save"
- tapOn: "Cancel"
