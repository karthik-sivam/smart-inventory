# Sign in steps - only runs when onboarding/auth screen is visible
appId: com.vishuddhi.smartinventory
---
- tapOn: "Skip"
- tapOn: "Sign In"
- tapOn:
    text: "Email"
    index: 0
- inputText: ${TEST_EMAIL}
- tapOn: "Password"
- inputText: ${TEST_PASSWORD}
- tapOn: "Sign In"
- waitForAnimationToEnd
- tapOn:
    text: "Allow"
    optional: true
- tapOn:
    text: "OK"
    optional: true
