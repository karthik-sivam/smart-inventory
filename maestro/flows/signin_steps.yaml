# Sign in steps - only runs when onboarding/auth screen is visible
appId: com.vishuddhi.stoqly
env:
  TEST_EMAIL: test@smartinventory.dev
  TEST_PASSWORD: Test@1234
---
- tapOn: "Skip"
- runFlow:
    when:
      visible: "Create your account"
    commands:
      - tapOn: "Sign In"
- tapOn:
    text: "Email"
    index: 0
- inputText: ${TEST_EMAIL}
- tapOn: "Password"
- inputText: ${TEST_PASSWORD}
- tapOn: "Sign In"
- waitForAnimationToEnd
- tapOn:
    text: "Not Now"
    optional: true
- tapOn:
    text: "Allow"
    optional: true
- tapOn:
    text: "Don’t Allow"
    optional: true
- tapOn:
    text: "Ask App Not to Track"
    optional: true
- tapOn:
    text: "OK"
    optional: true
