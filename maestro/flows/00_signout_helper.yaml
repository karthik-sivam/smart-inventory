# Helper — Reach auth screen only when necessary (conditional sign-out).
# If already logged in (dashboard KPIs visible), signs out via Profile so auth-only flows can run.
# If already on auth / not logged in, does nothing after launch.
appId: com.vishuddhi.stoqly
---
- launchApp
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Total Storages"
    file: signout_steps.yaml
