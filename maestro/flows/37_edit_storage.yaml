# Flow 37 — Edit Storage
# Tests: edit storage name; verify changes persist; restore original name
appId: com.vishuddhi.stoqly
---
- runFlow: 00_signin_helper.yaml
- tapOn: "Storages"
- swipe:
    direction: LEFT
    on: "Test Warehouse"
- tapOn: "Edit"
- assertVisible: "Edit Storage"
- tapOn: "Storage Name"
- eraseText: 50
- inputText: "Test Warehouse Edited"
- tapOn: "Save"
- assertVisible: "Test Warehouse Edited"
- swipe:
    direction: LEFT
    on: "Test Warehouse Edited"
- tapOn: "Edit"
- tapOn: "Storage Name"
- eraseText: 50
- inputText: "Test Warehouse"
- tapOn: "Save"
- assertVisible: "Test Warehouse"
