# Flow 14 — Export PDF
# Tests exporting a PDF report
appId: com.vishuddhi.smartinventory
---
- runFlow: 00_signin_helper.yaml
- tapOn: "Items"
- tapOn: "Export Data"
- assertVisible: "What to Export"

# Select Low Stock List
- tapOn: "Low Stock List"

# Select PDF format
- tapOn: "PDF Report"
- assertVisible: "Professional report"

- tapOn:
    text: "Export Data"
    index: 1
- waitForAnimationToEnd

- assertVisible: "Export Complete"
- tapOn: "OK"
