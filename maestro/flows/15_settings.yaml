# Flow 15 — Settings Screen
# Tests settings screen renders correctly and currency picker works
appId: com.vishuddhi.stoqly
---
- runFlow: 00_signin_helper.yaml

# Settings is accessed via the gear icon on the Dashboard
- tapOn: "Dashboard"
- tapOn:
    id: "gear"
- assertVisible: "Settings"

# Subscription section (Pro test build: Stoqly Pro + Manage Subscription)
- assertVisible: "Stoqly Pro"
- assertVisible: "Manage Subscription"

# Currency section
- assertVisible: "Currency"

# Privacy section
- assertVisible: "Privacy & Ads"

# Close settings
- tapOn: "Done"
