# Flow 28 -- Swipe actions on item rows (Items tab)
appId: com.vishuddhi.stoqly
env:
  ITEM_NAME: Test Product Maestro
---
- runFlow: 00_signin_helper.yaml
- runFlow:
    file: find_item_on_items_tab.yaml
    env:
      ITEM_NAME: Test Product Maestro
- assertVisible: "Test Product Maestro"

# Swipe left to reveal trailing actions (Edit + Delete)
- swipe:
    direction: LEFT
    on: "Test Product Maestro"
- assertVisible: "Edit"
- assertVisible: "Delete"

# Tap Edit -- sheet opens
- tapOn: "Edit"
- assertVisible: "Edit Item"
- tapOn: "Cancel"

# Swipe right to reveal leading action (Count)
- swipe:
    direction: RIGHT
    on: "Test Product Maestro"
- assertVisible: "Count"

# Tap Count -- quick count sheet opens
- tapOn: "Count"
- waitForAnimationToEnd
- runFlow: dismiss_count_tips.yaml
- extendedWaitUntil:
    visible: "Quick Count"
    timeout: 15000
- tapOn: "Cancel"
