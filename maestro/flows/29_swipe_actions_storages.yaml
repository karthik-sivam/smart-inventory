# Flow 29 -- Swipe actions on storage rows (Storages tab)
# Tests swipe-left reveals Edit + Delete on StorageListView rows
appId: com.vishuddhi.stoqly
---
- runFlow: 00_signin_helper.yaml
- tapOn: "Storages"
- assertVisible: "Test Warehouse"

# Swipe left on storage row to reveal trailing actions
- swipe:
    direction: LEFT
    on: "Test Warehouse"
- assertVisible: "Edit"
- assertVisible: "Delete"

# Tap Edit -- sheet opens
- tapOn: "Edit"
- assertVisible: "Test Warehouse"
- tapOn: "Cancel"

# Confirm we are back on Storages list
- assertVisible: "Test Warehouse"
