# Flow 10 — Full Count (Count Tab)
# Tests the full count flow from the Count tab
# Prerequisite: "Test Product" item exists
appId: com.vishuddhi.smartinventory
---
- runFlow: 00_signin_helper.yaml
- tapOn: "Count"
- assertVisible: "Inventory Count"

# Search for the item
- tapOn: "Search items to count…"
- inputText: "Test Product"
- assertVisible: "Test Product"

# Tap Count button on item card — opens Quick Count sheet first
- tapOn:
    text: "Count"
    index: 0
- waitForAnimationToEnd
- assertVisible: "Quick Count"

# Navigate to full count form
- tapOn: "Change UOM or count type"
- waitForAnimationToEnd
- assertVisible: "Count Item"
- assertVisible: "Current Quantity:"
- assertVisible: "Counted Quantity"

# Enter counted quantity
- tapOn: "Counted Quantity"
- eraseText: 10
- inputText: "42"

# Select adjustment reason
- tapOn: "Select reason"
- tapOn: "Physical Count"

# Add notes
- tapOn: "Notes (Optional)"
- inputText: "Full physical count - April"

# Check variance row is visible (appears after quantity is entered)
- assertVisible: "Variance:"

- tapOn: "Save"

# Should return to count list
- assertVisible: "Inventory Count"
