# Flow 10 — Full Count (Audit tab)
appId: com.vishuddhi.stoqly
env:
  ITEM_NAME: Test Product Maestro
---
- runFlow: 00_signin_helper.yaml
- tapOn: "Audit"
- assertVisible: "Audit"
- tapOn: "All"
- tapOn: "Search items to audit…"
- inputText: "Test Product Maestro"
- tapOn: "All"
- extendedWaitUntil:
    visible: "Test Product Maestro"
    timeout: 10000
- scrollUntilVisible:
    element: "Test Product Maestro"
    direction: DOWN
    timeout: 15000
- runFlow: open_quick_count_audit.yaml
- tapOn: "Change UOM or count type"
- waitForAnimationToEnd
- assertVisible: "Count Item"
- assertVisible: "Current Quantity:"
- assertVisible: "Counted Quantity"
- tapOn: "Counted Quantity"
- eraseText: 10
- inputText: "42"
- tapOn: "Select reason"
- tapOn: "Physical Count"
- tapOn: "Notes (Optional)"
- inputText: "Full physical count - April"
- assertVisible: "Variance:"
- tapOn: "Save"
- assertVisible: "Audit"
