# Flow 44 — Large Change Confirmation Alert
appId: com.vishuddhi.stoqly
env:
  ITEM_NAME: Test Product Maestro
---
- runFlow: 00_signin_helper.yaml
- runFlow: open_test_warehouse.yaml
- scrollUntilVisible:
    element: "Test Product Maestro"
    direction: DOWN
    timeout: 15000
- assertVisible: "Test Product Maestro"
# Reset to known baseline so large-change threshold is predictable
- runFlow:
    file: open_quick_count_swipe.yaml
    env:
      ITEM_NAME: ${ITEM_NAME}
- runFlow:
    file: fill_quick_count_set_to.yaml
    env:
      QTY: "50"
- runFlow: save_quick_count.yaml
- extendedWaitUntil:
    visible: ${ITEM_NAME}
    timeout: 10000
- runFlow:
    file: open_quick_count_swipe.yaml
    env:
      ITEM_NAME: ${ITEM_NAME}
- runFlow:
    file: fill_quick_count_set_to.yaml
    env:
      QTY: "150"
- tapOn: "Save"
- extendedWaitUntil:
    visible: "Save Anyway"
    timeout: 10000
- tapOn: "Save Anyway"
- assertVisible: ${ITEM_NAME}
