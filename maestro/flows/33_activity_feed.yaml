# Flow 33 — Activity Feed
appId: com.vishuddhi.stoqly
env:
  ITEM_NAME: Activity Test Item
---
- runFlow: 00_signin_helper.yaml
- runFlow: open_test_warehouse.yaml
- runFlow: open_add_item_storage.yaml
- tapOn:
    id: "itemNameField"
- eraseText: 80
- inputText: "Activity Test Item"
- tapOn:
    text: "Done"
    optional: true
- runFlow:
    file: fill_add_item_quantity.yaml
    env:
      QTY: "10"
- runFlow: save_add_item.yaml
- scrollUntilVisible:
    element: "Activity Test Item"
    direction: DOWN
    timeout: 15000
- assertVisible: "Activity Test Item"

- tapOn: "Dashboard"
- scrollUntilVisible:
    element: "Recent Activity"
    direction: DOWN
    timeout: 15000
- assertVisible: "Activity Test Item"

- runFlow: open_test_warehouse.yaml
- scrollUntilVisible:
    element: "Activity Test Item"
    direction: DOWN
    timeout: 15000
- runFlow:
    file: open_quick_count_swipe.yaml
    env:
      ITEM_NAME: Activity Test Item
- runFlow:
    file: fill_quick_count_set_to.yaml
    env:
      QTY: "15"
- runFlow: save_quick_count.yaml

- tapOn: "Dashboard"
- scrollUntilVisible:
    element: "Recent Activity"
    direction: DOWN
    timeout: 15000
- assertVisible: "Activity Test Item"

- runFlow: open_test_warehouse.yaml
- swipe:
    direction: LEFT
    on: "Activity Test Item"
- tapOn: "Delete"
- tapOn: "Delete"
