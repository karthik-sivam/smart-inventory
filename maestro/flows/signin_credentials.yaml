# Shared sign-in steps (auth screen → dashboard). No launchApp.
appId: com.vishuddhi.stoqly
env:
  TEST_EMAIL: test@smartinventory.dev
  TEST_PASSWORD: Test@1234
---
- runFlow:
    when:
      visible: "Create your account"
    commands:
      - tapOn: "Sign In"
- tapOn:
    text: "Email"
    index: 0
- eraseText: 64
- inputText: ${TEST_EMAIL}
- tapOn: "Password"
- inputText: ${TEST_PASSWORD}
- tapOn: "Sign In"
- waitForAnimationToEnd
- tapOn:
    text: "Not Now"
    optional: true
- tapOn:
    text: "Allow"
    optional: true
- tapOn:
    text: "Don’t Allow"
    optional: true
- tapOn:
    text: "Ask App Not to Track"
    optional: true
- tapOn:
    text: "OK"
    optional: true
- extendedWaitUntil:
    visible: "Welcome to Stoqly"
    timeout: 20000
    optional: true
- tapOn:
    text: "Skip for now"
    optional: true
- tapOn:
    id: "postLoginGetStarted"
    optional: true
- runFlow:
    when:
      visible: "Where do you store things?"
    commands:
      - tapOn:
          id: "postLoginStorageNameField"
      - inputText: "Test Warehouse"
      - tapOn:
          id: "postLoginCreateStorage"
      - extendedWaitUntil:
          visible: "You're all set!"
          timeout: 10000
      - tapOn:
          id: "postLoginLetsGo"
- tapOn:
    text: "Dashboard"
    optional: true
