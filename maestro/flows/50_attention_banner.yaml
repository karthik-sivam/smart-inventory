# Flow 50 — Low Stock KPI card → Reorder List
# Prerequisite: flow 21 seeds low-stock state (run immediately after 31).
appId: com.vishuddhi.stoqly
---
- runFlow: 00_signin_helper.yaml
- tapOn: "Dashboard"
- extendedWaitUntil:
    visible: "Low Stock"
    timeout: 15000
- tapOn:
    id: "lowStockKpiCard"
- extendedWaitUntil:
    visible: "Reorder List"
    timeout: 10000
- assertVisible: "Reorder List"
- tapOn: "Done"
- assertVisible: "Dashboard"
