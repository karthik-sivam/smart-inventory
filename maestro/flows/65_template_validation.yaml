# Flow 65 — Template name required (Save disabled when empty)
appId: com.vishuddhi.stoqly
---
- runFlow: 00_signin_helper.yaml
- tapOn: "Dashboard"
- tapOn:
    id: "gear"
- scrollUntilVisible:
    element: "Item Templates"
    direction: DOWN
    timeout: 10000
- tapOn: "Item Templates"
- tapOn:
    id: "createTemplateButton"
- assertVisible: "New Template"
- tapOn: "Template Name"
- inputText: "Temp"
- assertVisible: "Save"
- tapOn: "Cancel"
