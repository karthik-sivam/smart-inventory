# Flow 69 — Edit template with linked items shows confirmation (optional if no links)
appId: com.vishuddhi.stoqly
---
- runFlow: 00_signin_helper.yaml
- tapOn: "Dashboard"
- tapOn:
    id: "gear"
- scrollUntilVisible:
    element: "Item Templates"
    direction: DOWN
    timeout: 10000
- tapOn: "Item Templates"
- tapOn:
    text: "Maestro Test Template Edited"
    optional: true
- tapOn:
    text: "Maestro Test Template"
    optional: true
- tapOn:
    text: "Test Product Maestro"
    optional: true
- assertVisible:
    text: "Edit Template"
    optional: true
- assertVisible:
    text: "Used by"
    optional: true
