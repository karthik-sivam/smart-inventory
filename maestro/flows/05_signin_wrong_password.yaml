# Flow 05 — Sign In with Wrong Password
# Needs the auth screen: signs out only if dashboard is visible; if already on auth, continues.
appId: com.vishuddhi.stoqly
env:
  TEST_EMAIL: test@smartinventory.dev
  TEST_PASSWORD: Test@1234
---
- runFlow: 00_signout_helper.yaml

- runFlow:
    when:
      visible: "Create your account"
    commands:
      - tapOn: "Sign In"
- assertVisible: "Welcome back"

- tapOn:
    text: "Email"
    index: 0
- eraseText: 64
- inputText: ${TEST_EMAIL}

- tapOn: "Password"
- eraseText: 32
- inputText: "WrongPassword999"

- tapOn: "Sign In"
- waitForAnimationToEnd

# Match full alert message (substring matching can fail depending on Maestro/iOS version)
- extendedWaitUntil:
    visible:
      text: "Invalid credentials. Please try again."
    timeout: 25000
- tapOn: "OK"
