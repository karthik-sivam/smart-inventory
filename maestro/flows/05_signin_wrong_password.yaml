# Flow 05 — Sign In with Wrong Password
# Tests that error message appears for invalid credentials
appId: com.vishuddhi.smartinventory
---
- runFlow: 00_signout_helper.yaml
# After signout, app is on auth screen already — no Skip needed

- tapOn: "Sign In"
- assertVisible: "Welcome back"

- tapOn:
    text: "Email"
    index: 0
- inputText: ${TEST_EMAIL}

- tapOn: "Password"
- inputText: "WrongPassword999"

- tapOn: "Sign In"

# Error alert should appear
- assertVisible: "Error"
