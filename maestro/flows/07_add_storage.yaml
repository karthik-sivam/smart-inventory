# Flow 07 — Add Storage
# Tests creating a new storage area
# Prerequisite: Signed in
appId: com.vishuddhi.stoqly
---
- runFlow: 00_signin_helper.yaml
- tapOn: "Storages"
- assertVisible: "Storages"

# Open add storage sheet
- tapOn: "Add Storage"
- waitForAnimationToEnd

# Fill storage form
- tapOn: "Storage Name"
- inputText: "Test Warehouse"

- tapOn: "Location (Optional)"
- inputText: "Ground Floor"

- tapOn: "Description (Optional)"
- inputText: "Main test storage area"

- tapOn: "Save"
- scrollUntilVisible:
    element: "Test Warehouse"
    direction: DOWN
    timeout: 15000
- assertVisible: "Test Warehouse"
