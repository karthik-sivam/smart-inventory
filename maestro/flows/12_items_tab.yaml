# Flow 12 — Items Tab
# Tests browsing items across all storages and search
appId: com.vishuddhi.stoqly
env:
  ITEM_NAME: Test Product Maestro
---
- runFlow: 00_signin_helper.yaml
- runFlow:
    file: find_item_on_items_tab.yaml
    env:
      ITEM_NAME: Test Product Maestro
- assertVisible: "Test Product Maestro"

# Search by category to verify expanded search
- tapOn: "Search items..."
- eraseText: 30
- inputText: "Uncategorised"
- extendedWaitUntil:
    visible: "Test Product Maestro"
    timeout: 15000
- hideKeyboard:
    optional: true
- tapOn: "All Storages"
- scrollUntilVisible:
    element: "Test Product Maestro"
    direction: DOWN
    timeout: 10000
- assertVisible: "Test Product Maestro"

# Clear search
- tapOn: "Search items..."
- eraseText: 30
- assertVisible: "All Storages"
