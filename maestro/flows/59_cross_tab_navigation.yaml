# Flow 59 — Cross-Tab Navigation
appId: com.vishuddhi.stoqly
---
- runFlow: 00_signin_helper.yaml
- tapOn: "Dashboard"
- assertVisible: "Total Items"
- tapOn: "Items"
- runFlow:
    file: find_item_on_items_tab.yaml
    env:
      ITEM_NAME: Test Product Maestro
- tapOn: "Storages"
- scrollUntilVisible:
    element: "Test Warehouse"
    direction: DOWN
    timeout: 15000
- assertVisible: "Test Warehouse"
- tapOn: "Audit"
- assertVisible: "Due"
- tapOn: "Profile"
- tapOn: "Dashboard"
- assertVisible: "Total Items"
- tapOn: "Storages"
- scrollUntilVisible:
    element: "Test Warehouse"
    direction: DOWN
    timeout: 15000
- tapOn: "Test Warehouse"
- runFlow: open_test_product_detail.yaml
- tapOn: "Dashboard"
- runFlow: open_test_warehouse.yaml
- scrollUntilVisible:
    element: "Test Product Maestro"
    direction: DOWN
    timeout: 15000
- assertVisible: "Test Product Maestro"
