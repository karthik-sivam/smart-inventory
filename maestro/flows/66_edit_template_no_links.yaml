# Flow 66 — Edit template with no linked items (no confirmation dialog)
# Prerequisite: "Maestro Test Template" from flow 64
appId: com.vishuddhi.stoqly
---
- runFlow: 00_signin_helper.yaml
- tapOn: "Dashboard"
- tapOn:
    id: "gear"
- scrollUntilVisible:
    element: "Item Templates"
    direction: DOWN
    timeout: 10000
- tapOn: "Item Templates"
- extendedWaitUntil:
    visible: "Maestro Test Template"
    timeout: 10000
- tapOn: "Maestro Test Template"
- assertVisible: "Edit Template"
- tapOn:
    id: "templateNameField"
- eraseText: 30
- inputText: "Maestro Test Template Edited"
- tapOn: "Save"
- assertVisible: "Maestro Test Template Edited"
