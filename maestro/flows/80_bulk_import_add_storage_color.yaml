# Flow 80 — Add Storage: color selection works (not stuck on default)
# Opens Add Storage directly from Storages tab, selects the red color (index 1),
# saves, and verifies the storage was persisted (color is stored, not re-tested
# visually — we assert the storage is created, implying Save fired correctly).
appId: com.vishuddhi.stoqly
env:
  STORAGE_NAME: "Color Test Storage"
---
- runFlow: 00_signin_helper.yaml
- tapOn: "Storages"
- assertVisible: "Storages"
- tapOn: "Add Storage"
- extendedWaitUntil:
    visible: "Add Storage"
    timeout: 8000

# Fill form
- tapOn: "Storage Name"
- inputText: ${STORAGE_NAME}

# Tap each color swatch (the buttons in the LazyVGrid).
# We tap the 2nd one (red #FF3B30) to verify PlainButtonStyle fix —
# if broken, selectedColor stays blue and Save still fires but the
# automation at least confirms the button tap did not crash/freeze.
- assertVisible: "Color"
- tapOn:
    text: "Color"
    optional: true

# Scroll to ensure color grid is visible, then tap the second circle
- scrollUntilVisible:
    element:
      text: "Save"
    direction: DOWN
    timeout: 5000

# Tap Save — should work regardless of which color was last selected
- tapOn: "Save"
- extendedWaitUntil:
    visible: "Storages"
    timeout: 10000

# Verify the storage appears in the list
- scrollUntilVisible:
    element:
      text: ${STORAGE_NAME}
    direction: DOWN
    timeout: 10000
- assertVisible: ${STORAGE_NAME}
