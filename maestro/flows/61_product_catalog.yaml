# Flow 61 — Product Catalog (Save and Use Template)
appId: com.vishuddhi.stoqly
---
- runFlow: 00_signin_helper.yaml
- runFlow: open_test_warehouse.yaml
- scrollUntilVisible:
    element: "Test Product Maestro"
    direction: DOWN
    timeout: 15000
- swipe:
    direction: LEFT
    on: "Test Product Maestro"
- tapOn: "Edit"
- scrollUntilVisible:
    element: "Save as Template"
    direction: DOWN
    timeout: 15000
- tapOn: "Save as Template"
- tapOn: "Save"
- waitForAnimationToEnd
- runFlow: open_test_warehouse.yaml
- runFlow: open_add_item_storage.yaml
- assertVisible:
    text: "Use Template"
    optional: true
- tapOn:
    text: "Use Template"
    optional: true
- tapOn:
    text: "Test Product Maestro"
    optional: true
- tapOn: "Cancel"
