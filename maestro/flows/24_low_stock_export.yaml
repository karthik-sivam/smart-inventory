# Flow 24 — Low Stock List Export
# Prerequisite: Low Stock Item in Test Warehouse from flow 21.
appId: com.vishuddhi.stoqly
---
- runFlow: 00_signin_helper.yaml
- runFlow: open_test_warehouse.yaml
- scrollUntilVisible:
    element: "Low Stock Item"
    direction: DOWN
    timeout: 15000
- tapOn: "Low Stock Item"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Count Item"
    timeout: 15000
- tapOn: "Count Item"
- waitForAnimationToEnd
- runFlow: dismiss_count_tips.yaml
- extendedWaitUntil:
    visible: "Quick Count"
    timeout: 15000
- runFlow:
    file: fill_quick_count_set_to.yaml
    env:
      QTY: "3"
- runFlow: save_quick_count.yaml
- tapOn: "Items"
- tapOn: "Export Data"
- assertVisible: "What to Export"
- tapOn: "Low Stock List"
- assertVisible: "Preview"
- assertVisible: "Items to export"
- tapOn:
    text: "Export Data"
    index: 1
- waitForAnimationToEnd
- assertVisible: "Export Complete"
- tapOn: "OK"
