# Flow 75 — Value by Category Pie Chart (M2)
appId: com.vishuddhi.stoqly
---
- runFlow: 00_signin_helper.yaml
- tapOn: "Dashboard"
- assertVisible: "Total Value"
- tapOn: "Total Value"
- extendedWaitUntil:
    visible: "Value by Category"
    timeout: 10000
- assertVisible: "Value by Category"
- assertVisible: "Done"
- assertVisible:
    text: "Uncategorised"
    optional: true
- tapOn: "Done"
- assertVisible: "Dashboard"
