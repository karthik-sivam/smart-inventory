# Signs out via Profile tab
appId: com.vishuddhi.stoqly
---
- tapOn: "Profile"
- waitForAnimationToEnd
- scrollUntilVisible:
    element: "Sign Out"
    direction: DOWN
    timeout: 20000
    visibilityPercentage: 50
# Tap the Sign Out row in the Account section
- tapOn:
    text: "Sign Out"
    index: 0
- waitForAnimationToEnd
# Confirm the alert — tap the destructive "Sign Out" button (index 1, after Cancel)
- tapOn:
    text: "Sign Out"
    index: 1
- waitForAnimationToEnd
# After sign out, app shows auth screen
- assertVisible: "Stoqly"
