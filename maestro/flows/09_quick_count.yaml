# Flow 09 — Quick Count (Set-to / Adjust-by UI)
appId: com.vishuddhi.stoqly
env:
  ITEM_NAME: Test Product Maestro
---
- runFlow: 00_signin_helper.yaml
- runFlow: open_test_warehouse.yaml
- scrollUntilVisible:
    element: "Test Product Maestro"
    direction: DOWN
    timeout: 15000
- runFlow:
    file: open_quick_count_swipe.yaml
    env:
      ITEM_NAME: ${ITEM_NAME}
- assertVisible: "Set to"
- assertVisible: "Adjust by"
- assertVisible: "--"
- runFlow:
    file: fill_quick_count_set_to.yaml
    env:
      QTY: "45"
- assertNotVisible: "--"
- tapOn: "Notes (optional)"
- inputText: "Monthly recount"
- tapOn: "Save"
- tapOn:
    text: "Save Anyway"
    optional: true
- waitForAnimationToEnd
- runFlow: open_test_warehouse.yaml
- scrollUntilVisible:
    element: "Test Product Maestro"
    direction: DOWN
    timeout: 15000
- runFlow:
    file: open_quick_count_swipe.yaml
    env:
      ITEM_NAME: ${ITEM_NAME}
- tapOn: "Adjust by"
- runFlow:
    file: fill_quick_count_set_to.yaml
    env:
      QTY: "5"
- tapOn: "Save"
- tapOn:
    text: "Save Anyway"
    optional: true
- waitForAnimationToEnd
