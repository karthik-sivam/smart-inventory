# Flow 19 — Delete Storage
# Tests the delete storage confirmation and removal
appId: com.vishuddhi.stoqly
---
- runFlow: 00_signin_helper.yaml
- tapOn: "Storages"

# Swipe row to reveal Delete action
- swipe:
    direction: LEFT
    on: "Test Warehouse"
- tapOn: "Delete"

# Confirm deletion in alert
- assertVisible: "Delete Storage"
- tapOn: "Delete"

# Confirm we're still on the Storages screen after deletion
- assertVisible: "Storages"
