# Flow 62 — Non-numeric count input keeps Save disabled
appId: com.vishuddhi.stoqly
env:
  ITEM_NAME: Test Product Maestro
---
- runFlow: 00_signin_helper.yaml
- runFlow: open_test_warehouse.yaml
- runFlow:
    file: open_quick_count_swipe.yaml
    env:
      ITEM_NAME: ${ITEM_NAME}
- assertVisible: "--"
- runFlow:
    file: fill_quick_count_set_to.yaml
    env:
      QTY: "abc"
- assertVisible:
    text: "--"
    optional: true
- runFlow:
    file: fill_quick_count_set_to.yaml
    env:
      QTY: "10"
- tapOn: "Save"
- assertVisible: ${ITEM_NAME}
