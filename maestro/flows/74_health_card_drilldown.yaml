# Flow 74 — Inventory Health Card Drill-Down (M2)
appId: com.vishuddhi.stoqly
---
- runFlow: 00_signin_helper.yaml
- tapOn: "Dashboard"
- scrollUntilVisible:
    element:
      text: "Inventory Health"
    direction: DOWN
    timeout: 15000
    visibilityPercentage: 30
- tapOn: "Inventory Health"
- extendedWaitUntil:
    visible: "Inventory Health"
    timeout: 10000
- assertVisible: "Done"
- assertVisible:
    text: "All Good!"
    optional: true
- assertVisible:
    text: "Out of Stock"
    optional: true
- assertVisible:
    text: "Low Stock"
    optional: true
- assertVisible:
    text: "Not counted in 30 days"
    optional: true
- tapOn: "Done"
- assertVisible: "Dashboard"
