# Flow 57 — Restock Cycle End-to-End
appId: com.vishuddhi.stoqly
env:
  ITEM_NAME: Restock Cycle Item
---
- runFlow: 00_signin_helper.yaml
- tapOn: "Storages"
- tapOn: "Test Warehouse"
- tapOn:
    text: "Add Item"
- extendedWaitUntil:
    visible: "SKU (Optional)"
    timeout: 10000
- tapOn: "Item Name"
- inputText: ${ITEM_NAME}
- runFlow:
    file: fill_add_item_quantity.yaml
    env:
      QTY: "20"
- scrollUntilVisible:
    element:
      id: "minQuantityInput"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "minQuantityInput"
- inputText: "15"
- runFlow: save_add_item.yaml
- runFlow:
    file: open_quick_count_swipe.yaml
    env:
      ITEM_NAME: ${ITEM_NAME}
- runFlow:
    file: fill_quick_count_set_to.yaml
    env:
      QTY: "5"
- runFlow: save_quick_count.yaml
- tapOn: "Dashboard"
- scrollUntilVisible:
    element: "Tap to view reorder list"
    direction: DOWN
    timeout: 10000
    optional: true
- tapOn: "Storages"
- tapOn: "Test Warehouse"
- runFlow:
    file: open_quick_count_swipe.yaml
    env:
      ITEM_NAME: ${ITEM_NAME}
- runFlow:
    file: fill_quick_count_set_to.yaml
    env:
      QTY: "50"
- runFlow: save_quick_count.yaml
- swipe:
    direction: LEFT
    on: ${ITEM_NAME}
- tapOn: "Delete"
- tapOn: "Delete"
