# Flow 48 — Dashboard Inventory Health Card
appId: com.vishuddhi.stoqly
---
- runFlow: 00_signin_helper.yaml
- tapOn: "Dashboard"
- scrollUntilVisible:
    element: "Inventory Health"
    direction: DOWN
    timeout: 10000
- assertVisible: "Inventory Health"
- assertVisible: "/ 100"
- tapOn: "Inventory Health"
- extendedWaitUntil:
    visible: "Inventory Health"
    timeout: 10000
- assertVisible: "Done"
- tapOn: "Done"
- assertVisible: "Dashboard"
