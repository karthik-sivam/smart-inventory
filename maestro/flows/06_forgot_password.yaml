# Flow 06 — Forgot Password
# Needs Sign In + Forgot Password UI: signs out only if dashboard is visible.
appId: com.vishuddhi.stoqly
env:
  TEST_EMAIL: test@smartinventory.dev
  TEST_PASSWORD: Test@1234
---
- runFlow: 00_signout_helper.yaml

- runFlow:
    when:
      visible: "Create your account"
    commands:
      - tapOn: "Sign In"
- tapOn: "Forgot Password?"
- assertVisible: "Reset Password"

- tapOn: "Email"
- inputText: ${TEST_EMAIL}

- tapOn: "Send Reset Link"
- assertVisible: "Success"
- tapOn: "OK"
