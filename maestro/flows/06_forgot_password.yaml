# Flow 06 — Forgot Password
# Tests the password reset flow
appId: com.vishuddhi.smartinventory
---
- runFlow: 00_signout_helper.yaml
# After signout, app is on auth screen already — no Skip needed

- tapOn: "Sign In"
- tapOn: "Forgot Password?"
- assertVisible: "Reset Password"

- tapOn: "Email"
- inputText: ${TEST_EMAIL}

- tapOn: "Send Reset Link"
- assertVisible: "Success"
