# Helper — Ensure app is on Dashboard (preserves session/data between flows).
# Skips credential entry when already on the dashboard.
appId: com.vishuddhi.stoqly
env:
  TEST_EMAIL: test@smartinventory.dev
  TEST_PASSWORD: Test@1234
---
- launchApp
- extendedWaitUntil:
    visible: "Total Storages"
    timeout: 12000
    optional: true
- runFlow:
    when:
      visible:
        id: "onboarding.title.0"
    file: signin_onboarding_dismiss.yaml
- runFlow:
    when:
      visible: "Welcome back"
    file: signin_credentials.yaml
- extendedWaitUntil:
    visible: "Total Storages"
    timeout: 90000
