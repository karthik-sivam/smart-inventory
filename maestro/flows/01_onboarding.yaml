# Flow 01 — Onboarding
# Tests the 4-page onboarding walkthrough on first launch
appId: com.vishuddhi.stoqly
---
- launchApp:
    appId: com.vishuddhi.stoqly
    clearState: true
    arguments:
      UITestResetOnboarding: true
# Fresh install: notification + ATT sheets can cover onboarding (iOS 18+)
- tapOn:
    text: "Don’t Allow"
    optional: true
- tapOn:
    text: "Ask App Not to Track"
    optional: true
- waitForAnimationToEnd
# SplashScreenView ~4s, then fullScreenCover onboarding; title uses accessibility id
- extendedWaitUntil:
    visible:
      id: "onboarding.title.0"
    timeout: 25000
- assertVisible: "Skip"

# Page 1 → Page 2
- tapOn: "Next"
- assertVisible: "Organise by Location"

# Page 2 → Page 3
- tapOn: "Next"
- assertVisible: "Never Run Out"

# Page 3 → Page 4
- tapOn: "Next"
- assertVisible: "Your Data, Everywhere"
- assertVisible: "No credit card required. Free forever."
- assertNotVisible: "Skip"

# Complete onboarding
- tapOn: "Get Started"
- assertVisible: "Stoqly"
