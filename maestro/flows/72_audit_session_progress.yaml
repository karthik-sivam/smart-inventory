# Flow 72 — Audit Session Progress (M1)
appId: com.vishuddhi.stoqly
env:
  ITEM_NAME: Test Product Maestro
---
- runFlow: 00_signin_helper.yaml
- tapOn: "Audit"
- assertVisible: "Audit"
- assertVisible:
    text: "counted"
    optional: true
- tapOn: "All"
- scrollUntilVisible:
    element: "Test Product Maestro"
    direction: DOWN
    timeout: 15000
- assertVisible: "Test Product Maestro"
- runFlow: open_quick_count_audit.yaml
- runFlow:
    file: fill_quick_count_set_to.yaml
    env:
      QTY: "30"
- runFlow: save_quick_count.yaml
- assertVisible:
    text: "counted"
    optional: true
- assertVisible: ${ITEM_NAME}
