# Flow 70 — Delete template shows confirmation; cancel keeps template
appId: com.vishuddhi.stoqly
---
- runFlow: 00_signin_helper.yaml
- tapOn: "Dashboard"
- tapOn:
    id: "gear"
- scrollUntilVisible:
    element: "Item Templates"
    direction: DOWN
    timeout: 10000
- tapOn: "Item Templates"
- swipe:
    direction: LEFT
    on: "Maestro Test Template Edited"
    optional: true
- swipe:
    direction: LEFT
    on: "Maestro Test Template"
    optional: true
- tapOn:
    text: "Delete"
    optional: true
- waitForAnimationToEnd
- assertVisible:
    text: "Delete Template?"
    optional: true
- tapOn:
    text: "Cancel"
    optional: true
- tapOn:
    point: "50%,92%"
    optional: true
- assertVisible:
    text: "Maestro Test Template Edited"
    optional: true
- assertVisible:
    text: "Maestro Test Template"
    optional: true
