# Flow 04 — Sign In
# Ensures dashboard with valid credentials: signs in only when the auth screen is shown;
# if already logged in, skips credential entry and asserts KPIs.
# Prerequisite: Firebase account for TEST_EMAIL / TEST_PASSWORD
appId: com.vishuddhi.stoqly
env:
  TEST_EMAIL: test@smartinventory.dev
  TEST_PASSWORD: Test@1234
---
- runFlow: 00_signin_helper_fresh.yaml
# Dashboard greeting is "Stoqly" — require KPI cards after sign-in
- assertVisible: "Total Storages"
- assertVisible: "Total Items"
