# Flow 63 — Item Templates entry visible in Settings for Pro users
appId: com.vishuddhi.stoqly
---
- runFlow: 00_signin_helper.yaml
- tapOn: "Dashboard"
- tapOn:
    id: "gear"
- scrollUntilVisible:
    element: "Item Templates"
    direction: DOWN
    timeout: 10000
- assertVisible: "Item Templates"
- tapOn: "Item Templates"
- assertVisible: "Item Templates"
- assertVisible:
    text: "No Templates Yet"
    optional: true
- tapOn:
    text: "Back"
    optional: true
